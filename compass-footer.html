<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Compass — Footer (Standalone)</title>
		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Figtree:wght@300;400;500;600;700;800;900&display=swap"
			rel="stylesheet"
		/>

		<style>
			/* ── Brand Tokens ── */
			:root {
				--navy:        #1f355b;
				--blue:        #3d60a0;
				--light-blue:  #859ac1;
				--cream:       #eef3fa;
				--white:       #ffffff;
				--dark:        #0d1827;
				--text-muted:  #5a7090;
				--border:      rgba(61, 96, 160, 0.15);

				--font-headline: 'Montserrat', sans-serif;
				--font-body:     'Figtree', sans-serif;

				--radius-sm:  6px;
				--radius-md:  12px;
				--radius-lg:  20px;
				--radius-pill: 100px;

				--shadow-sm: 0 1px 3px rgba(13,24,39,0.08), 0 1px 2px rgba(13,24,39,0.06);
				--shadow-md: 0 4px 16px rgba(13,24,39,0.10), 0 2px 6px rgba(13,24,39,0.08);
				--shadow-lg: 0 12px 40px rgba(13,24,39,0.14), 0 4px 12px rgba(13,24,39,0.10);

				--transition: 0.25s ease;
			}

			/* ── Reset ── */
			*, *::before, *::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				font-family: var(--font-body);
				font-size: 16px;
				line-height: 1.6;
				color: var(--dark);
				background: var(--white);
			}

			/* ── Sticky footer wrapper technique ── */
			.footer-sticky-wrapper {
				position: relative;
				height: 70vh;
				clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
			}

			.footer-sticky-inner {
				position: relative;
				height: calc(100vh + 70vh);
				top: -100vh;
			}

			#compass-footer {
				position: sticky;
				top: calc(100vh - 70vh);
				height: 70vh;
				background: var(--dark);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-end;
				padding: 48px 24px 36px;
				overflow: hidden;
			}

			/* Oversized COMPASS typographic treatment */
			.footer-bg-text {
				position: absolute;
				bottom: -0.1em;
				left: 50%;
				transform: translateX(-50%);
				font-family: var(--font-headline);
				font-size: clamp(3rem, 12vw, 10rem);
				font-weight: 900;
				letter-spacing: -0.04em;
				white-space: nowrap;
				background: linear-gradient(to bottom, rgba(31, 53, 91, 0.25), transparent);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
				pointer-events: none;
				user-select: none;
				line-height: 1;
			}

			/* Floating logo card */
			.footer-logo-card {
				border: 1px solid rgba(61, 96, 160, 0.25);
				border-radius: var(--radius-lg);
				padding: 12px 20px;
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
				background: rgba(31, 53, 91, 0.3);
				margin-bottom: 24px;
				position: relative;
				z-index: 1;
			}

			.footer-logo-card img {
				height: 48px;
				width: auto;
				object-fit: contain;
				display: block;
			}

			/* Social dock */
			#compass-dock {
				display: flex;
				align-items: flex-end;
				gap: 12px;
				padding: 10px 16px;
				background: rgba(255, 255, 255, 0.06);
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: var(--radius-pill);
				margin-bottom: 32px;
				position: relative;
				z-index: 1;
			}

			.dock-item {
				width: 40px;
				height: 40px;
				border-radius: var(--radius-md);
				background: rgba(255, 255, 255, 0.08);
				display: flex;
				align-items: center;
				justify-content: center;
				text-decoration: none;
				color: rgba(255, 255, 255, 0.65);
				font-size: 1rem;
				transition:
					background 0.2s ease,
					color 0.2s ease;
			}

			.dock-item:hover {
				background: rgba(61, 96, 160, 0.3);
				color: #fff;
			}

			/* Brand links row */
			.footer-brand-links {
				display: flex;
				gap: 28px;
				margin-bottom: 20px;
				flex-wrap: wrap;
				justify-content: center;
				position: relative;
				z-index: 1;
			}

			/* Nav links */
			.footer-nav-links {
				display: flex;
				gap: 24px;
				margin-bottom: 20px;
				flex-wrap: wrap;
				justify-content: center;
				position: relative;
				z-index: 1;
			}

			.footer-link {
				font-family: var(--font-body);
				font-size: 0.8125rem;
				font-weight: 500;
				color: rgba(255, 255, 255, 0.5);
				text-decoration: none;
				position: relative;
				transition: color 0.2s ease;
			}

			.footer-link::after {
				content: "";
				position: absolute;
				bottom: -2px;
				left: 0;
				width: 0;
				height: 1px;
				background: var(--light-blue);
				transition: width 0.25s ease;
			}

			.footer-link:hover {
				color: rgba(255, 255, 255, 0.85);
			}

			.footer-link:hover::after {
				width: 100%;
			}

			.footer-brand-link {
				font-size: 0.75rem;
				font-weight: 600;
				color: rgba(133, 154, 193, 0.55);
			}

			.footer-brand-link:hover {
				color: var(--light-blue);
			}

			/* Legal + copyright */
			.footer-legal {
				display: flex;
				gap: 20px;
				flex-wrap: wrap;
				justify-content: center;
				margin-bottom: 16px;
				position: relative;
				z-index: 1;
			}

			.footer-legal a {
				font-family: var(--font-body);
				font-size: 0.6875rem;
				color: rgba(255, 255, 255, 0.25);
				text-decoration: none;
				transition: color 0.2s ease;
			}

			.footer-legal a:hover {
				color: rgba(255, 255, 255, 0.5);
			}

			.footer-copy {
				font-family: var(--font-body);
				font-size: 0.6875rem;
				color: rgba(255, 255, 255, 0.2);
				text-align: center;
				position: relative;
				z-index: 1;
			}

			/* ── Demo content (for scroll testing only — remove when embedding) ── */
			.demo-content {
				max-width: 800px;
				margin: 60px auto;
				padding: 0 20px;
				color: var(--text-muted);
				font-size: 1.125rem;
				line-height: 2;
			}
		</style>
	</head>
	<body>
		<!-- Demo content for scroll testing — remove when embedding -->
		<div class="demo-content">
			<p>Scroll down to see the footer slide up from beneath this content.</p>
			<p style="margin-top: 120vh;">Keep scrolling...</p>
		</div>

		<!-- ============================================================
		  FOOTER — Sticky wrapper for slide-up effect
		============================================================ -->
		<div class="footer-sticky-wrapper">

							src="https://assets.cdn.filesafe.space/5KNcJcblwftDgsKpBJfp/media/685588248b2950e5056f625d.png"

					<!-- Social dock (macOS-style magnify on hover) -->

				</footer>
			</div>
		</div>

		<script>
			// Dock magnify — macOS-style scale effect on hover
			(function () {
				var dock = document.getElementById("compass-dock");
				if (!dock) return;

				var items = dock.querySelectorAll(".dock-item");

				dock.addEventListener("mousemove", function (e) {
					var dockRect = dock.getBoundingClientRect();
					var mouseX = e.clientX - dockRect.left;

					items.forEach(function (item) {
						var itemRect = item.getBoundingClientRect();
						var itemCenter = itemRect.left + itemRect.width / 2 - dockRect.left;
						var distance = Math.abs(mouseX - itemCenter);
						var maxDist = 80;
						var scale = distance < maxDist
							? 1 + (1 - distance / maxDist) * 0.7
							: 1;
						item.style.transform = "scale(" + scale + ")";
						item.style.transformOrigin = "bottom center";
					});
				});

				dock.addEventListener("mouseleave", function () {
					items.forEach(function (item) {
						item.style.transform = "scale(1)";
					});
				});
			})();
		</script>
	</body>
</html>
